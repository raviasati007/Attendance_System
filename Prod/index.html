<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0078d7, #00b4ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      width: 320px;
      text-align: center;
      animation: fadeIn 0.6s ease;
    }
    .login-box h2 {
      margin-bottom: 20px;
      color: #0078d7;
      font-size: 24px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0078d7, #00b4ff);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: background 0.3s ease;
    }
    button:hover {
      background: linear-gradient(135deg, #005fa3, #0090cc);
    }
    .error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="login()">Login</button>
    <div id="errorMsg" class="error"></div>
  </div>

  <script>
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      if (!username || !password) {
        errorMsg.textContent = "Please enter both username and password.";
        return;
      }

      const hashedPassword = await sha256(password);

      // Example stored hash (replace with secure backend validation)
      const storedHash = "04256df38ff7a308dc6802f43a6a9700347b4038428a7a816d82953e1759f8fe";
      const validUser = "admin";

      if (hashedPassword === storedHash && username === validUser) {
        // Save session in localStorage
        localStorage.setItem("sessionUser", username);
        window.location.href = "https://raviasati007.github.io/Attendance_System/Prod/app.html";
      } else {
        errorMsg.textContent = "Invalid username or password.";
      }
    }

    // Auto-redirect if session exists
    window.onload = function() {
      const sessionUser = localStorage.getItem("sessionUser");
      if (sessionUser) {
        window.location.href = "https://raviasati007.github.io/Attendance_System/Prod/app.html";
      }
    }
  </script>
</body>
</html>
