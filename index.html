<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 20px; background: #f4f4f9; }
    h2 { text-align: center; color: #333; }
    .date-picker { text-align: center; margin-bottom: 20px; }
    .date-picker label { font-weight: bold; margin-right: 10px; }
    .card-container {
      display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px;
      margin-top: 20px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 20px;
      flex: 1 1 300px;
      max-width: 400px;
    }
    .card h3 { text-align: center; color: #0078d7; margin-bottom: 15px; }
    .student {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; border-bottom: 1px solid #eee;
    }
    .student:last-child { border-bottom: none; }
    button {
      padding: 10px 16px; margin: 2px; border: none; border-radius: 6px; cursor: pointer;
      background-color: #ddd; color: #333; font-size: 14px;
    }
    .btn-present.active { background-color: #4CAF50; color: white; }
    .btn-absent.active { background-color: #f44336; color: white; }
    .present { background-color: #e8f5e9; }
    .absent { background-color: #ffebee; }
    #submitBtn {
      display: block; margin: 30px auto; padding: 14px 28px;
      background: #0078d7; color: #fff; border: none; border-radius: 6px; cursor: pointer;
      font-size: 16px;
    }
    #submitBtn:hover { background: #005a9e; }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .card-container { flex-direction: column; align-items: center; }
      .card { width: 100%; max-width: 95%; }
      .student { flex-direction: column; align-items: flex-start; }
      .student span { margin-bottom: 8px; font-weight: bold; }
      .student div { width: 100%; display: flex; justify-content: space-around; }
      button { flex: 1; font-size: 16px; }
    }
  </style>
</head>
<body>
  <h2>Student Attendance</h2>
  <div class="date-picker">
    <label for="attendanceDate">Select Date:</label>
    <input type="date" id="attendanceDate" required>
  </div>
  <form id="attendanceForm">
    <div class="card-container" id="cards"></div>
    <button id="submitBtn" type="submit">Submit Attendance</button>
  </form>

  <script>
    const sheetURL = "https://script.google.com/macros/s/AKfycby0uMl2xBv4GFbrPr6shR1Uy7Mpi0isUAb50Wrak1cwBF_0OXf0_lnqVCF_TXJMTRn6/exec";

    const students = [
      "CD24001","CD24002","CD24003","CD24004","CD24005","CD24006","CD24007","CD24008","CD24009","CD24010",
      "CD24011","CD24012","CD24013","CD24014","CD24015","CD24016","CD24017","CD24018","CD24019","CD24020",
      "CD24021","CD24022","CD24023","CD24024","CD24025","CD24026","CD24027","CD24028","CD24029","CD24030",
      "CD24031","CD24032","CD24033","CD24034","CD24035","CD24036","CD24037","CD24038","CD24039","CD24040",
      "CD24041","CD24042","CD24043","CD24044","CD24045","CD24046","CD24047","CD24048","CD24049","CD24050",
      "CD24052","CD24053","CD24054","CD24056","CD24057","CD24060","CD24061","CD24062","CD24063","CD24064",
      "CD25D001","CD25D002","CD25D003","CD25D004","CD25D005","CD25D006","CD25D007","CD25D008",
      "EE24TCD001","EE24TCD002"
    ];

    const attendanceData = {};
    const cardsContainer = document.getElementById("cards");

    // Split students into 3 groups
    const chunkSize = Math.ceil(students.length / 3);
    const groups = [];
    for (let i = 0; i < students.length; i += chunkSize) {
      groups.push(students.slice(i, i + chunkSize));
    }

    // Build cards
    groups.forEach((group, idx) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<h3>Group ${idx+1}</h3>`;
      group.forEach(rollNo => {
        const studentDiv = document.createElement("div");
        studentDiv.className = "student";
        studentDiv.innerHTML = `
          <span>${rollNo}</span>
          <div>
            <button type="button" class="btn-present" onclick="mark('${rollNo}', this, 'P')">P</button>
            <button type="button" class="btn-absent" onclick="mark('${rollNo}', this, 'A')">A</button>
          </div>
        `;
        card.appendChild(studentDiv);
      });
      cardsContainer.appendChild(card);
    });

    function mark(rollNo, btn, status) {
      attendanceData[rollNo] = status;
      const studentDiv = btn.closest(".student");
      studentDiv.className = status === "P" ? "student present" : "student absent";

      // Reset both buttons to neutral, then activate the clicked one
      const buttons = studentDiv.querySelectorAll("button");
      buttons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    document.getElementById("attendanceForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const date = document.getElementById("attendanceDate").value;
      if (!date) {
        alert("⚠️ Please select a date before submitting.");
        return;
      }

      // Ask for confirmation
      if (!confirm("Are you sure you want to submit attendance for " + date + "?")) {
        return;
      }

      const data = [];
      students.forEach(rollNo => {
        const attendance = attendanceData[rollNo] || "A"; // default Absent
        data.push({ rollNo, name: rollNo, attendance, date });
      });

      fetch(sheetURL, {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(msg => {
        alert("✅ Attendance updated successfully for " + date);
      })
      .catch(err => alert("❌ Error: " + err));
    });
  </script>
</body>
</html>
