<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance - Clean Design</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 20px; background: #f4f4f9; }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }

    .date-picker, .extra-fields {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .date-picker label, .extra-fields label {
      font-weight: 600;
      margin-right: 8px;
      font-size: 15px;
      color: #333;
    }
    .date-picker input[type="date"],
    .extra-fields input[type="text"],
    .extra-fields input[type="time"] {
      padding: 10px 14px;
      border: 2px solid #0078d7;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      color: #333;
      background-color: #fff;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .date-picker input[type="date"]:hover,
    .extra-fields input:hover {
      border-color: #005a9e;
      box-shadow: 0 0 6px rgba(0, 120, 215, 0.3);
    }
    .date-picker input[type="date"]:focus,
    .extra-fields input:focus {
      outline: none;
      border-color: #005a9e;
      box-shadow: 0 0 8px rgba(0, 90, 158, 0.5);
    }

    .card-container {
      display: grid;
      gap: 20px;
      margin-top: 20px;
    }
    @media (max-width: 600px) {
      .card-container { grid-template-columns: 1fr; }
    }
    @media (min-width: 601px) and (max-width: 900px) {
      .card-container { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 901px) {
      .card-container { grid-template-columns: 1fr 1fr 1fr; }
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 20px;
    }

    .student {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    .student:last-child { border-bottom: none; }

    .student-details span {
      font-weight: 600;
      color: #333;
    }

    .status-btn {
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      margin-left: 4px;
      background-color: #ddd;
      color: #333;
    }
    .status-btn.present.active { background-color: #4CAF50; color: #fff; }
    .status-btn.absent.active { background-color: #f44336; color: #fff; }

    #submitBtn {
      display: block; margin: 30px auto; padding: 14px 28px;
      background: #0078d7; color: #fff; border: none; border-radius: 6px; cursor: pointer;
      font-size: 16px;
    }
    #submitBtn:hover { background: #005a9e; }
  </style>
</head>
<body>
  <h2>Class Attendance</h2>
  <div class="date-picker">
    <label for="attendanceDate">Select Date:</label>
    <input type="date" id="attendanceDate" required>
  </div>
  <div class="extra-fields">
    <label for="topic">Topic:</label>
    <input type="text" id="topic" placeholder="Enter topic" required>
    <label for="inTime">In Time:</label>
    <input type="time" id="inTime" required>
    <label for="outTime">Out Time:</label>
    <input type="time" id="outTime" required>
  </div>
  <form id="attendanceForm">
    <div class="card-container" id="cards"></div>
    <button id="submitBtn" type="submit">Submit Attendance</button>
  </form>

  <script>
    const sheetURL = "https://script.google.com/macros/s/AKfycbywbkpbOub4906Fc5x6MB8SPeuM1AMcWiU-TH6k5hfVf-FPlmqFfWhOZkXhtGaXNDIF/exec";

    const students = [
      "CD24001","CD24002","CD24003","CD24004","CD24005","CD24006","CD24007","CD24008","CD24009","CD24010",
      "CD24011","CD24012","CD24013","CD24014","CD24015","CD24016","CD24017","CD24018","CD24019","CD24020",
      "CD24021","CD24022","CD24023","CD24024","CD24025","CD24026","CD24027","CD24028","CD24029","CD24030",
      "CD24031","CD24032","CD24033","CD24034","CD24035","CD24036","CD24037","CD24038","CD24039","CD24040",
      "CD24041","CD24042","CD24043","CD24044","CD24045","CD24046","CD24047","CD24048","CD24049","CD24050",
      "CD24052","CD24053","CD24054","CD24056","CD24057","CD24060","CD24061","CD24062","CD24063","CD24064",
      "CD25D001","CD25D002","CD25D003","CD25D004","CD25D005","CD25D006","CD25D007","CD25D008",
      "EE24TCD001","EE24TCD002"
    ];

    const attendanceData = {};
    const cardsContainer = document.getElementById("cards");

    const chunkSize = 15;
    for (let i = 0; i < students.length; i += chunkSize) {
      const group = students.slice(i, i + chunkSize);
      const card = document.createElement("div");
      card.className = "card";
      group.forEach(rollNo => {
        const studentDiv = document.createElement("div");
        studentDiv.className = "student";
        studentDiv.innerHTML = `
          <div class="student-details">
            <span>${rollNo}</span>
          </div>
          <div>
            <button type="button" class="status-btn present" onclick="mark('${rollNo}', this, 'P')">P</button>
            <button type="button" class="status-btn absent" onclick="mark('${rollNo}', this, 'A')">A</button>
          </div>
        `;
        card.appendChild(studentDiv);
      });
      cardsContainer.appendChild(card);
    }

    function mark(rollNo, btn, status) {
      attendanceData[rollNo] = status;
      const studentDiv = btn.closest(".student");
      const buttons = studentDiv.querySelectorAll(".status-btn");
      buttons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    document.getElementById("attendanceForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const date = document.getElementById("attendanceDate").value;
      const topic = document.getElementById("topic").value.trim();
      const inTime = document.getElementById("inTime").value;
      const outTime = document.getElementById("outTime").value;

      if (!date || !topic || !inTime || !outTime) {
        alert("⚠️ Please fill all fields before submitting.");
        return;
      }
      if (!confirm(`Are you sure you want to submit attendance for ${date}?`)) {
        return;
      }

      const attendancePayload = students.map(rollNo => ({
        rollNo,
        attendance: attendanceData[rollNo] || "A",
        date
      }));

      const sessionPayload = {
        date,
        topic,
        time: `${inTime} - ${outTime}`
      };

      fetch(sheetURL, {
        method: "POST",
        body: JSON.stringify({
          attendance: attendancePayload,
          session: sessionPayload
        })
      })
      .then(res => res.text())
      .then(msg => alert("✅ Attendance and session metadata saved successfully!"))
      .catch(err => alert("❌ Error: " + err));
    });
  </script>
</body>
</html>
